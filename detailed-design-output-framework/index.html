<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>详细设计文档输出</title>
    <style>
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f2ec; color: #202528; line-height: 1.65; }
      main { max-width: 960px; margin: 0 auto; padding: 44px 28px; }
      h1 { margin: 0 0 12px; font-size: 36px; line-height: 1.2; }
      p { color: #667075; }
      .panel { background: #fff; border: 1px solid #d6d0c4; border-radius: 8px; padding: 22px; margin: 20px 0; }
      .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
      .step { border: 1px solid #d6d0c4; border-radius: 8px; padding: 14px; background: #fffaf6; }
      a { color: #1f6f78; text-decoration: none; }
      a:hover { text-decoration: underline; }
      code { background: #e8e3d8; border-radius: 4px; padding: 2px 5px; }
      @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } h1 { font-size: 30px; } }
    </style>
  </head>
  <body>
    <main>
      <h1>详细设计文档输出</h1>
      <p>两名资深开发和一名测试协作，把产品方案与技术架构细化为可开发、可测试、可上线的详细设计文档。</p>
      <div class="panel">
        <p><strong>触发词：</strong><code>详细设计文档输出：</code> 或 <code>详细设计：</code></p>
        <p><a href="./framework-design/final-framework.md">查看最终框架</a> · <a href="./templates/final-detailed-design-template.md">查看详细设计模板</a></p>
      </div>
      <section class="grid">
        <div class="step"><strong>资深开发 A</strong><br />数据表、索引、状态机、事务边界、核心算法。</div>
        <div class="step"><strong>资深开发 B</strong><br />服务拆分、中间件、接口、并发性能、部署运维。</div>
        <div class="step"><strong>测试负责人</strong><br />测试策略、用例矩阵、压测、故障注入、验收门禁。</div>
      </section>
    </main>
  </body>
</html>
